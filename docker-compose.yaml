name: pettycash-system

services:
  pettycash-backend:
    image: pettycash-backend-image
    container_name: pettycash-backend-container
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./:/app # bind mount to sync local and container
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    
    depends_on:
      - pettycash-db
  
  pettycash-db:
    image: postgres:18
    restart: always
    container_name: pettycash-postgres-container
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/18/docker # named volume to store my data for peristence 
  
volumes:
  postgres_data:

