<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notification</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background-color: #f4f4f7;
        font-family: Arial, sans-serif;
        color: #333333;
      }
      .wrapper {
        max-width: 560px;
        margin: 40px auto;
        background-color: #ffffff;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }
      .header {
        background-color: #1a1a2e;
        padding: 32px 40px;
        text-align: center;
      }
      .header h1 {
        color: #ffffff;
        font-size: 22px;
        font-weight: 700;
      }
      .header p {
        color: #a0a0b0;
        font-size: 13px;
        margin-top: 4px;
      }
      .body {
        padding: 40px;
      }
      .body p {
        font-size: 15px;
        line-height: 1.7;
        color: #555555;
      }
      .message-block {
        max-width: 500px;
        margin: 24px 0;
        background-color: #f4f4f7;
        border-left: 4px solid #1a1a2e;
        padding: 16px 20px;
        border-radius: 4px;
        font-size: 15px;
        color: #333;
        line-height: 1.6;
      }
      .footer {
        background-color: #f4f4f7;
        padding: 24px 40px;
        text-align: center;
        font-size: 12px;
        color: #aaaaaa;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="header">
        <h1>Petty Cash &amp; Expense Tracker</h1>
        <p>{{ event_name }}</p>
      </div>
      <div class="body">
        <p>Hello <strong>{{ fullname }}</strong>,</p>
        <br />
        <p>You have a new notification regarding your account:</p>
        <div class="message-block">{{ message }}</div>
      </div>
      <div class="footer">
        <p>This is an automated message. Please do not reply to this email.</p>
        <p style="margin-top: 8px">
          © 2026 Petty Cash &amp; Expense Tracker. All rights reserved.
        </p>
      </div>
    </div>
  </body>
</html>
